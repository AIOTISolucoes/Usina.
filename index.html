<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Login • AIOTI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#7FD055" />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/png" sizes="192x192" href="img/icon-192.png" />
  <link rel="apple-touch-icon" href="img/icon-192.png" />
  <link rel="stylesheet" href="css/login.css" />
</head>

<body class="login-page">

  <!-- Animated background canvas -->
  <canvas id="bgCanvas"></canvas>

  <!-- Overlays -->
  <div class="grid-overlay"></div>
  <div class="scanline"></div>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>

  <div class="login-container">
    <div class="login-card">

      <!-- Corner accent -->
      <div class="corner-br"></div>

      <!-- ── LOGO ── -->
      <div class="logo-area">
        <img src="assets/logo-aioti.png" class="logo-img" alt="AIOTI" />
      </div>

      <p class="login-subtitle">Soluções Industriais · IoT</p>
      <div class="divider"></div>

      <!-- ── FORM ── -->
      <form id="loginForm">

        <div class="form-group">
          <label for="username">Usuário</label>
          <div class="input-wrapper">
            <input
              type="text"
              id="username"
              name="username"
              placeholder="Digite seu usuário"
              autocomplete="username"
              required
            />
            <!-- Icon: user -->
            <svg class="input-icon" viewBox="0 0 20 20" fill="currentColor">
              <path d="M10 10a4 4 0 100-8 4 4 0 000 8zm-7 8a7 7 0 1114 0H3z"/>
            </svg>
          </div>
        </div>

        <div class="form-group">
          <label for="password">Senha</label>
          <div class="input-wrapper">
            <input
              type="password"
              id="password"
              name="password"
              placeholder="Digite sua senha"
              autocomplete="current-password"
              required
            />
            <!-- Icon: lock -->
            <svg class="input-icon" viewBox="0 0 20 20" fill="currentColor">
              <path fill-rule="evenodd" d="M10 2a4 4 0 00-4 4v2H5a2 2 0 00-2 2v7a2 2 0 002 2h10a2 2 0 002-2V10a2 2 0 00-2-2h-1V6a4 4 0 00-4-4zm2 6V6a2 2 0 10-4 0v2h4zm-1 4a1 1 0 10-2 0v2a1 1 0 102 0v-2z" clip-rule="evenodd"/>
            </svg>
          </div>
        </div>

        <button type="submit" class="login-btn">Entrar</button>

        <div id="loginError" class="login-error" style="display:none;">
          Usuário ou senha inválidos
        </div>

      </form>

      <div class="card-footer">AIOTI · Sistema Industrial · v2.0</div>
    </div>
  </div>

  <script src="js/login.js"></script>
  <script src="js/pwa.js"></script>

  <!-- Background particle animation -->
  <script>
    const canvas = document.getElementById('bgCanvas');
    const ctx = canvas.getContext('2d');
    let W, H, particles = [];

    function resize() {
      W = canvas.width  = window.innerWidth;
      H = canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', () => { resize(); initParticles(); });
    resize();

    function initParticles() {
      particles = [];
      const count = Math.min(Math.floor((W * H) / 14000), 80);
      for (let i = 0; i < count; i++) {
        particles.push({
          x: Math.random() * W,
          y: Math.random() * H,
          vx: (Math.random() - 0.5) * 0.25,
          vy: -0.1 - Math.random() * 0.3,
          size: 0.5 + Math.random() * 1.5,
          alpha: 0.1 + Math.random() * 0.5,
          color: Math.random() > 0.6 ? '#3dffb0' : '#1cc97a',
          pulse: Math.random() * Math.PI * 2,
          pulseSpeed: 0.01 + Math.random() * 0.015,
        });
      }
    }
    initParticles();

    // Connection lines between nearby particles
    function drawConnections() {
      const maxDist = 130;
      for (let i = 0; i < particles.length; i++) {
        for (let j = i + 1; j < particles.length; j++) {
          const dx = particles[i].x - particles[j].x;
          const dy = particles[i].y - particles[j].y;
          const dist = Math.sqrt(dx*dx + dy*dy);
          if (dist < maxDist) {
            const alpha = (1 - dist/maxDist) * 0.12;
            ctx.beginPath();
            ctx.moveTo(particles[i].x, particles[i].y);
            ctx.lineTo(particles[j].x, particles[j].y);
            ctx.strokeStyle = `rgba(29,185,100,${alpha})`;
            ctx.lineWidth = 0.5;
            ctx.stroke();
          }
        }
      }
    }

    function animate() {
      ctx.clearRect(0, 0, W, H);

      drawConnections();

      particles.forEach(p => {
        p.pulse += p.pulseSpeed;
        const alphaMod = p.alpha * (0.6 + 0.4 * Math.sin(p.pulse));

        // Glow
        const grad = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.size * 4);
        grad.addColorStop(0, p.color.replace(')', `,${alphaMod * 0.5})`).replace('rgb', 'rgba').replace('#3dffb0', `rgba(61,255,176,${alphaMod*0.4})`).replace('#1cc97a', `rgba(28,201,122,${alphaMod*0.4})`));
        grad.addColorStop(1, 'transparent');

        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size * 4, 0, Math.PI * 2);
        ctx.fillStyle = p.color === '#3dffb0'
          ? `rgba(61,255,176,${alphaMod * 0.08})`
          : `rgba(28,201,122,${alphaMod * 0.08})`;
        ctx.fill();

        // Core dot
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fillStyle = p.color === '#3dffb0'
          ? `rgba(61,255,176,${alphaMod})`
          : `rgba(28,201,122,${alphaMod})`;
        ctx.fill();

        p.x += p.vx;
        p.y += p.vy;

        if (p.y < -10) { p.y = H + 10; p.x = Math.random() * W; }
        if (p.x < -10) p.x = W + 10;
        if (p.x > W + 10) p.x = -10;
      });

      requestAnimationFrame(animate);
    }
    animate();
  </script>

</body>
</html>
